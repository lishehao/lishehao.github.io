name: Build Hugo Site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.153.3'
          extended: true

      - name: Build
        run: hugo --gc --minify --destination public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: public
